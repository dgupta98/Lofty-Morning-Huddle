services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_INSFORGE_URL: ${NEXT_PUBLIC_INSFORGE_URL}
        NEXT_PUBLIC_INSFORGE_ANON_KEY: ${NEXT_PUBLIC_INSFORGE_ANON_KEY}
        NEXT_PUBLIC_DEMO_AGENT_ID: ${NEXT_PUBLIC_DEMO_AGENT_ID}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_INSFORGE_URL: ${NEXT_PUBLIC_INSFORGE_URL}
      NEXT_PUBLIC_INSFORGE_ANON_KEY: ${NEXT_PUBLIC_INSFORGE_ANON_KEY}
      INSFORGE_SERVICE_KEY: ${INSFORGE_SERVICE_KEY}
      HF_API_KEY: ${HF_API_KEY}
      DEMO_AGENT_ID: ${DEMO_AGENT_ID}
      NEXT_PUBLIC_DEMO_AGENT_ID: ${NEXT_PUBLIC_DEMO_AGENT_ID}
    restart: unless-stopped
